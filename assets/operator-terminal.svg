<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Futuristic terminal profile</title>
  <desc id="desc">Animated futuristic terminal showing whoami, mission, and current interests for Simon Oakes.</desc>
  <defs>
    <linearGradient id="outerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.5" stop-color="#07111f" />
      <stop offset="1" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04110f" />
      <stop offset="0.55" stop-color="#07151e" />
      <stop offset="1" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="0.46" stop-color="#34d399" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="47%" r="58%">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.20" />
      <stop offset="0.65" stop-color="#0f766e" stop-opacity="0.06" />
      <stop offset="1" stop-color="#020617" stop-opacity="0" />
    </radialGradient>
    <pattern id="microGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#67e8f9" stroke-width="0.6" opacity="0.06" />
    </pattern>
    <pattern id="fineLines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#a7f3d0" opacity="0.045" />
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.52" />
    </filter>
    <filter id="textGlow" x="-18%" y="-50%" width="136%" height="200%">
      <feGaussianBlur stdDeviation="0.55" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="type1" clipPathUnits="userSpaceOnUse"><rect x="104" y="94" width="0" height="30"><animate attributeName="width" from="0" to="510" dur="0.9s" begin="0.35s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2" clipPathUnits="userSpaceOnUse"><rect x="104" y="128" width="0" height="30"><animate attributeName="width" from="0" to="630" dur="1.05s" begin="1.35s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3" clipPathUnits="userSpaceOnUse"><rect x="104" y="176" width="0" height="30"><animate attributeName="width" from="0" to="610" dur="1s" begin="2.65s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4" clipPathUnits="userSpaceOnUse"><rect x="104" y="210" width="0" height="30"><animate attributeName="width" from="0" to="980" dur="1.65s" begin="3.85s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5" clipPathUnits="userSpaceOnUse"><rect x="104" y="258" width="0" height="30"><animate attributeName="width" from="0" to="680" dur="1.05s" begin="5.8s" fill="freeze" /></rect></clipPath>
    <clipPath id="type6" clipPathUnits="userSpaceOnUse"><rect x="104" y="292" width="0" height="30"><animate attributeName="width" from="0" to="1010" dur="1.7s" begin="7.05s" fill="freeze" /></rect></clipPath>
    <clipPath id="type7" clipPathUnits="userSpaceOnUse"><rect x="104" y="342" width="0" height="30"><animate attributeName="width" from="0" to="350" dur="0.75s" begin="9.05s" fill="freeze" /></rect></clipPath>

    <style>
      .term { font: 500 19px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 0; filter: url(#textGlow); }
      .header { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #8ee7d4; opacity: 0.78; letter-spacing: 0.8px; }
      .prompt { fill: #fbbf24; }
      .cmd { fill: #f8fafc; }
      .out { fill: #8ef0b4; }
      .muted { fill: #67e8f9; opacity: 0.78; }
      .rail { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #67e8f9; opacity: 0.68; letter-spacing: 1px; }
      .cursor { animation: blink 0.9s steps(1) infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .trace { stroke-dasharray: 8 12; animation: trace 7s linear infinite; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.95; } }
      @keyframes trace { to { stroke-dashoffset: -160; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#outerBg)" />
  <rect width="1200" height="420" rx="30" fill="url(#microGrid)" />
  <circle cx="256" cy="76" r="230" fill="#22d3ee" opacity="0.08" />
  <circle cx="1040" cy="364" r="260" fill="#f59e0b" opacity="0.07" />

  <g filter="url(#shadow)">
    <rect x="42" y="42" width="1116" height="336" rx="26" fill="url(#panelBg)" stroke="#1e3a3a" stroke-width="2" />
    <rect x="42" y="42" width="1116" height="336" rx="26" fill="url(#fineLines)" />
    <rect x="42" y="42" width="1116" height="4" rx="2" fill="url(#neon)" />
  </g>

  <rect x="70" y="68" width="1060" height="282" rx="18" fill="#020617" opacity="0.62" stroke="#164e63" stroke-opacity="0.75" />
  <path d="M70 104 H1130" stroke="#164e63" stroke-width="1" opacity="0.55" />
  <rect x="70" y="68" width="1060" height="282" rx="18" fill="url(#coreGlow)" />

  <path class="trace" d="M804 82 H980 C1020 82 1020 122 1060 122 H1120" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.35" />
  <path class="trace" d="M820 334 H950 C1000 334 1000 294 1050 294 H1120" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.28" />

  <text x="104" y="92" class="header">SOAKES-OPS / macOS zsh / secure session</text>
  <text x="978" y="92" class="header">ONLINE</text>
  <circle class="pulse" cx="1060" cy="87" r="5" fill="#34d399" />

  <text x="84" y="142" class="rail">01</text>
  <text x="84" y="224" class="rail">02</text>
  <text x="84" y="306" class="rail">03</text>
  <path d="M92 152 V206 M92 234 V288" stroke="#67e8f9" stroke-width="1" opacity="0.28" />

  <g clip-path="url(#type1)">
    <text x="104" y="120" class="term"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> whoami</tspan></text>
  </g>
  <g clip-path="url(#type2)">
    <text x="104" y="154" class="term out">Senior Linux / DevOps / Platform Engineer</text>
  </g>

  <g clip-path="url(#type3)">
    <text x="104" y="202" class="term"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> mission --brief</tspan></text>
  </g>
  <g clip-path="url(#type4)">
    <text x="104" y="236" class="term out">Turn complex infrastructure into repeatable, observable, recoverable platforms.</text>
  </g>

  <g clip-path="url(#type5)">
    <text x="104" y="284" class="term"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> interests --current</tspan></text>
  </g>
  <g clip-path="url(#type6)">
    <text x="104" y="318" class="term out">automation | network security | object storage | build platforms | practical AI</text>
  </g>

  <g clip-path="url(#type7)">
    <text x="104" y="368" class="term muted">soakes@macbook:~$</text>
  </g>
  <rect class="cursor" x="310" y="351" width="11" height="22" rx="2" fill="#8ef0b4">
    <animate attributeName="opacity" values="0;0;1;0;1;0" keyTimes="0;0.94;0.955;0.97;0.985;1" dur="10.2s" repeatCount="indefinite" />
  </rect>
</svg>
