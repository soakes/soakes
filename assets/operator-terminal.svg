<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated platform terminal</title>
  <desc id="desc">Animated terminal card matching the Simon Oakes profile banner style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.48" stop-color="#0f172a" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.52" stop-color="#0b1220" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.52" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#f97316" />
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.34" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.22" />
      <stop offset="1" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#94a3b8" stroke-width="0.7" opacity="0.13" />
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="135%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38" />
    </filter>

    <clipPath id="type1" clipPathUnits="userSpaceOnUse"><rect x="92" y="91" width="0" height="28"><animate attributeName="width" from="0" to="430" dur="0.85s" begin="0.35s" fill="freeze" /></rect></clipPath>
    <clipPath id="type2" clipPathUnits="userSpaceOnUse"><rect x="92" y="124" width="0" height="28"><animate attributeName="width" from="0" to="575" dur="1.05s" begin="1.3s" fill="freeze" /></rect></clipPath>
    <clipPath id="type3" clipPathUnits="userSpaceOnUse"><rect x="92" y="170" width="0" height="28"><animate attributeName="width" from="0" to="515" dur="0.95s" begin="2.55s" fill="freeze" /></rect></clipPath>
    <clipPath id="type4" clipPathUnits="userSpaceOnUse"><rect x="92" y="203" width="0" height="28"><animate attributeName="width" from="0" to="985" dur="1.55s" begin="3.65s" fill="freeze" /></rect></clipPath>
    <clipPath id="type5" clipPathUnits="userSpaceOnUse"><rect x="92" y="249" width="0" height="28"><animate attributeName="width" from="0" to="600" dur="1s" begin="5.45s" fill="freeze" /></rect></clipPath>
    <clipPath id="type6" clipPathUnits="userSpaceOnUse"><rect x="92" y="282" width="0" height="28"><animate attributeName="width" from="0" to="930" dur="1.45s" begin="6.65s" fill="freeze" /></rect></clipPath>
    <clipPath id="type7" clipPathUnits="userSpaceOnUse"><rect x="92" y="318" width="0" height="28"><animate attributeName="width" from="0" to="300" dur="0.7s" begin="8.35s" fill="freeze" /></rect></clipPath>

    <style>
      .terminal { font: 500 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #e2e8f0; letter-spacing: 0; }
      .chrome { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #94a3b8; letter-spacing: 0; }
      .prompt { fill: #38bdf8; font-weight: 700; }
      .cmd { fill: #f8fafc; }
      .out { fill: #cbd5e1; }
      .blue { fill: #38bdf8; }
      .green { fill: #34d399; }
      .orange { fill: #fb923c; }
      .purple { fill: #a78bfa; }
      .muted { fill: #94a3b8; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; transform-origin: center; }
      .draw { stroke-dasharray: 10 12; animation: dash 7s linear infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.52; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -220; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)" />
  <rect width="1200" height="360" rx="28" fill="url(#grid)" />
  <circle cx="146" cy="76" r="190" fill="url(#glowA)" />
  <circle cx="1042" cy="308" r="232" fill="url(#glowB)" />
  <path d="M0 292 C170 255 250 328 430 292 C610 256 710 226 890 264 C1040 296 1100 244 1200 226 L1200 360 L0 360 Z" fill="url(#accent)" opacity="0.14" />

  <g opacity="0.9" filter="url(#softGlow)">
    <path class="draw" d="M714 78 C790 52 838 94 900 142 C956 186 1012 178 1086 146" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.44" />
    <path class="draw" d="M728 282 C798 224 866 226 930 260 C1002 296 1044 252 1106 226" fill="none" stroke="#f97316" stroke-width="2" opacity="0.38" />
    <circle class="pulse" cx="714" cy="78" r="5" fill="#38bdf8" />
    <circle class="pulse" cx="900" cy="142" r="5" fill="#8b5cf6" />
    <circle class="pulse" cx="1086" cy="146" r="5" fill="#38bdf8" />
    <circle class="pulse" cx="728" cy="282" r="5" fill="#f97316" />
    <circle class="pulse" cx="930" cy="260" r="5" fill="#8b5cf6" />
    <circle class="pulse" cx="1106" cy="226" r="5" fill="#f97316" />
  </g>

  <g filter="url(#shadow)">
    <rect x="56" y="42" width="1088" height="304" rx="20" fill="url(#panel)" opacity="0.9" stroke="#334155" />
    <rect x="56" y="42" width="1088" height="38" rx="20" fill="#0f172a" stroke="#334155" />
    <rect x="56" y="42" width="1088" height="3" rx="2" fill="url(#accent)" />
  </g>

  <circle cx="82" cy="61" r="5" fill="#f87171" />
  <circle cx="103" cy="61" r="5" fill="#fbbf24" />
  <circle cx="124" cy="61" r="5" fill="#34d399" />
  <text x="150" y="68" class="chrome">soakes@macbook - platform-session</text>
  <text x="1010" y="68" class="chrome">ONLINE</text>
  <circle class="pulse" cx="1080" cy="63" r="4.5" fill="#34d399" />

  <g clip-path="url(#type1)">
    <text x="92" y="113" class="terminal"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> whoami</tspan></text>
  </g>
  <g clip-path="url(#type2)">
    <text x="92" y="146" class="terminal out">Senior Linux / DevOps / Platform Engineer</text>
  </g>

  <g clip-path="url(#type3)">
    <text x="92" y="192" class="terminal"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> mission --brief</tspan></text>
  </g>
  <g clip-path="url(#type4)">
    <text x="92" y="225" class="terminal out">Turn complex infrastructure into repeatable, observable, recoverable platforms.</text>
  </g>

  <g clip-path="url(#type5)">
    <text x="92" y="271" class="terminal"><tspan class="prompt">soakes@macbook:~$</tspan><tspan class="cmd"> interests --current</tspan></text>
  </g>
  <g clip-path="url(#type6)">
    <text x="92" y="304" class="terminal">
      <tspan class="blue">automation</tspan><tspan class="muted"> | </tspan>
      <tspan class="green">network security</tspan><tspan class="muted"> | </tspan>
      <tspan class="purple">object storage</tspan><tspan class="muted"> | </tspan>
      <tspan class="orange">build platforms</tspan><tspan class="muted"> | </tspan>
      <tspan class="green">practical AI</tspan>
    </text>
  </g>

  <g clip-path="url(#type7)">
    <text x="92" y="340" class="terminal"><tspan class="prompt">soakes@macbook:~$</tspan></text>
  </g>
  <rect x="306" y="323" width="10" height="22" rx="2" fill="#38bdf8" opacity="0">
    <animate attributeName="opacity" begin="9.1s" values="1;1;0;0" keyTimes="0;0.48;0.49;1" dur="0.9s" repeatCount="indefinite" />
  </rect>
</svg>
