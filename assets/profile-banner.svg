<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Simon Oakes profile banner</title>
  <desc id="desc">Senior Linux, DevOps, and Platform Engineer. Automation-first infrastructure, network security, S3 tooling, and practical AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.48" stop-color="#0f172a" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.52" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#f97316" />
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.25" />
      <stop offset="1" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#94a3b8" stroke-width="0.7" opacity="0.16" />
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .title { font: 800 68px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 600 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: 0; }
      .small { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #cbd5e1; letter-spacing: 0; }
      .terminal { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #e2e8f0; letter-spacing: 0; }
      .muted { fill: #94a3b8; }
      .green { fill: #34d399; }
      .blue { fill: #38bdf8; }
      .orange { fill: #fb923c; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; transform-origin: center; }
      .draw { stroke-dasharray: 10 12; animation: dash 7s linear infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.52; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -220; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)" />
  <rect width="1200" height="360" rx="28" fill="url(#grid)" />
  <circle cx="160" cy="72" r="180" fill="url(#glowA)" />
  <circle cx="1040" cy="308" r="230" fill="url(#glowB)" />
  <path d="M0 292 C170 255 250 328 430 292 C610 256 710 226 890 264 C1040 296 1100 244 1200 226 L1200 360 L0 360 Z" fill="url(#accent)" opacity="0.18" />

  <g opacity="0.9" filter="url(#softGlow)">
    <path class="draw" d="M694 92 C770 64 830 94 894 150 C950 200 1008 198 1080 164" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.58" />
    <path class="draw" d="M712 244 C786 188 852 214 914 246 C988 284 1036 246 1100 218" fill="none" stroke="#f97316" stroke-width="2" opacity="0.48" />
    <circle class="pulse" cx="694" cy="92" r="5" fill="#38bdf8" />
    <circle class="pulse" cx="894" cy="150" r="5" fill="#8b5cf6" />
    <circle class="pulse" cx="1080" cy="164" r="5" fill="#38bdf8" />
    <circle class="pulse" cx="712" cy="244" r="5" fill="#f97316" />
    <circle class="pulse" cx="914" cy="246" r="5" fill="#8b5cf6" />
    <circle class="pulse" cx="1100" cy="218" r="5" fill="#f97316" />
  </g>

  <g transform="translate(66 72)">
    <rect x="0" y="0" width="82" height="30" rx="15" fill="#0f766e" opacity="0.24" />
    <text x="18" y="20" class="label">SOAKES</text>
    <text x="0" y="96" class="title">Simon Oakes</text>
    <text x="3" y="136" class="subtitle">Senior Linux | DevOps | Platform Engineer</text>
    <rect x="3" y="165" width="540" height="3" rx="2" fill="url(#accent)" />
    <text x="3" y="204" class="small">automation  |  network  |  security  |  build platforms  |  AI</text>
  </g>

  <g transform="translate(720 78)">
    <rect x="0" y="0" width="390" height="210" rx="18" fill="#020617" opacity="0.78" stroke="#334155" />
    <rect x="0" y="0" width="390" height="38" rx="18" fill="#0f172a" stroke="#334155" />
    <circle cx="24" cy="19" r="5" fill="#f87171" />
    <circle cx="44" cy="19" r="5" fill="#fbbf24" />
    <circle cx="64" cy="19" r="5" fill="#34d399" />
    <text x="22" y="70" class="terminal"><tspan class="muted">$</tspan> deploy --target production</text>
    <text x="22" y="102" class="terminal"><tspan class="green">ok</tspan> repeatable workflows</text>
    <text x="22" y="132" class="terminal"><tspan class="blue">ok</tspan> observable platforms</text>
    <text x="22" y="162" class="terminal"><tspan class="orange">ok</tspan> recoverable systems</text>
    <text x="22" y="192" class="terminal"><tspan class="green">ready</tspan> calm operations</text>
  </g>
</svg>
